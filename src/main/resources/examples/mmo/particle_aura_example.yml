# Feuerfackel — flame helix + enchantment ring, offhand
FEUERFACKEL:
  displayname: "<red>Feuerfackel"
  Mechanics:
    particle_aura:
      slot: offhand
      interval_ticks: 2
      layers:
        - shape: helix
          particle: FLAME
          radius: 1.2
          count: 2
          rotation_speed: 0.18
          height: 2.0
        - shape: ring
          particle: ENCHANTMENT_TABLE
          radius: 1.0
          count: 3
          rotation_speed: -0.12
          y_offset: 0.5

# Eisfackel — sphere of snow + orbit of end rods
EISFACKEL:
  displayname: "<aqua>Eisfackel"
  Mechanics:
    particle_aura:
      slot: offhand
      interval_ticks: 3
      layers:
        - shape: sphere
          particle: SNOW_SHOVEL
          radius: 1.4
          count: 4
          rotation_speed: 0.08
        - shape: orbit
          particle: END_ROD
          radius: 1.6
          count: 2
          orb_count: 3
          rotation_speed: 0.2
          y_offset: 1.0

# Sturmfackel — tornado vortex, gets denser while sprinting
STURMFACKEL:
  displayname: "<gray>Sturmfackel"
  Mechanics:
    particle_aura:
      slot: offhand
      interval_ticks: 1
      layers:
        - shape: tornado
          particle: CLOUD
          radius: 1.3
          count: 3
          rotation_speed: 0.25
          height: 2.2
          count_sprint_multiplier: 2.5
        - shape: ring
          particle: SPELL_MOB
          radius: 0.8
          count: 2
          rotation_speed: 0.1
          y_offset: -0.2
          only_on_sprint: true

# Seelenfackel — damage burst layer + passive random particles
SEELENFACKEL:
  displayname: "<dark_purple>Seelenfackel"
  Mechanics:
    particle_aura:
      slot: offhand
      interval_ticks: 4
      layers:
        - shape: random
          particle: SPELL_WITCH
          radius: 1.5
          count: 5
        - shape: sphere
          particle: SOUL
          radius: 2.0
          count: 8
          rotation_speed: 0.05
          only_on_damage: true

# Kriegerschulter — armor_chest aura, only active while sprinting
KRIEGERSCHULTER:
  displayname: "<gold>Kriegerschulter"
  Mechanics:
    particle_aura:
      slot: armor_chest
      interval_ticks: 2
      conditions:
        require_sprinting: true
      layers:
        - shape: helix
          particle: CRIT
          radius: 1.0
          count: 2
          rotation_speed: 0.2
          height: 2.0
